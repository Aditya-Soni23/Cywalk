<!DOCTYPE html>
<html>
<head>
    <title>Trip Summary | Cywalk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div class="floating-stats">
        <div class="stat-item"><span class="label">Distance</span><span id="res-dist" class="val">--</span></div>
        <div class="stat-item"><span class="label">Avg Speed</span><span id="res-avg" class="val">--</span></div>
        <div class="stat-item"><span class="label">Duration</span><span id="res-time" class="val">--</span></div>
    </div>

    <div class="bottom-controls">
        <button class="finish-btn" style="background: var(--primary);" onclick="location.href='history.html'">Back to History</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBv9lQi7pbdg-usNwd2HOhdpwT2OBVfr34",
            authDomain: "cywalk-eddc3.firebaseapp.com",
            databaseURL: "https://cywalk-eddc3-default-rtdb.firebaseio.com",
            projectId: "cywalk-eddc3",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Get Trip ID from URL
        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('id');

        // 2. Initialize Map IMMEDIATELY at your home
        // This prevents the "broken" gray screen
        const map = L.map('map', { zoomControl: false }).setView([17.5274, 78.5371], 16);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        async function loadTripData() {
            if (!tripId) return;

            try {
                const snapshot = await get(ref(db, `rides/${tripId}`));
                
                if (snapshot.exists()) {
                    const trip = snapshot.val();
                    
                    // Update Stats UI
                    document.getElementById('res-dist').innerText = trip.distance + " km";
                    document.getElementById('res-avg').innerText = (trip.avgSpeed || "0.0") + " km/h";
                    document.getElementById('res-time').innerText = trip.time;

                    // 3. Draw Path Traces
                    if (trip.path) {
                        // Handle both Array and Object formats
                        const pathData = Array.isArray(trip.path) ? trip.path : Object.values(trip.path);
                        const coords = pathData.map(p => [p.lat, p.lng]);
                        
                        // Draw the line
                        const polyline = L.polyline(coords, { 
                            color: '#2563eb', 
                            weight: 6, 
                            lineJoin: 'round',
                            opacity: 0.8
                        }).addTo(map);

                        // Start/End Markers
                        L.circleMarker(coords[0], { radius: 6, color: '#fff', fillColor: '#10b981', fillOpacity: 1, weight: 2 }).addTo(map);
                        L.circleMarker(coords[coords.length - 1], { radius: 6, color: '#fff', fillColor: '#ef4444', fillOpacity: 1, weight: 2 }).addTo(map);

                        // 4. Adjust view to show the whole trip
                        map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
                    }
                } else {
                    alert("Trip not found!");
                }
            } catch (err) {
                console.error("Error loading map:", err);
            }
        }

        loadTripData();
    </script>
</body>
</html>
