<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Past <span>Records</span></h1>
        <div id="list" style="flex-grow: 1; overflow-y: auto;"></div>
        <button onclick="location.href='index.html'" class="btn btn-mode">Back Home</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = { /* ... paste your config ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, "rides"), (snap) => {
            const data = snap.val();
            const list = document.getElementById("list");
            list.innerHTML = "";
            Object.values(data || {}).reverse().forEach(ride => {
                list.innerHTML += `
                    <div class="history-item">
                        <div>
                            <strong>${ride.mode === 'walking' ? '🚶' : '🚴'} ${ride.distance} km</strong>
                            <div style="font-size: 0.8rem; color: var(--text-dim)">${ride.date}</div>
                        </div>
                        <div style="color: var(--primary); font-weight: bold">${ride.duration}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
