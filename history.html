<!DOCTYPE html>
<html>
<head>
    <title>Records</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 style="padding: 25px 20px 10px;">Your Journeys</h2>
    <div id="history-container"></div>
    <div style="padding: 20px; position: sticky; bottom: 0; background: var(--bg);">
        <button class="mode-btn" onclick="location.href='index.html'">Back Home</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBv9lQi7pbdg-usNwd2HOhdpwT2OBVfr34",
            authDomain: "cywalk-eddc3.firebaseapp.com",
            databaseURL: "https://cywalk-eddc3-default-rtdb.firebaseio.com",
            projectId: "cywalk-eddc3",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, "rides"), (snap) => {
            const container = document.getElementById('history-container');
            const data = snap.val();
            container.innerHTML = "";
            
            if (!data) {
                container.innerHTML = `<p style="padding: 20px; color: var(--text-sec);">No journeys recorded yet.</p>`;
                return;
            }

            // Get keys and reverse so newest trips are at the top
            Object.keys(data).reverse().forEach(id => {
                const trip = data[id];
                const card = document.createElement('div');
                card.className = 'trip-card';
                
                // Entire card is now a clickable link to view the trip
                card.style.cursor = "pointer";
                card.onclick = () => location.href = `view-trip.html?id=${id}`;

                card.innerHTML = `
                    <div style="flex-grow:1">
                        <strong style="color: var(--text-main);">${(trip.mode || 'Trip').toUpperCase()}</strong>
                        <div style="font-size:12px; color:var(--text-sec)">${trip.date}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="color:var(--primary); font-weight:800">${trip.distance} km</div>
                        <div style="font-size:11px; color:var(--accent)">Avg: ${trip.avgSpeed || '0.0'} km/h</div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
