<!DOCTYPE html>
<html>
<head>
    <title>Cywalk | Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="home-container">
        <div class="main-card">
            <h1 style="color: var(--google-blue); margin-bottom: 5px;">Cywalk</h1>
            <p style="color: var(--text-sec); margin-bottom: 25px;">Ready for a session?</p>
            
            <button class="mode-btn" onclick="start('walking')">🚶 Walking</button>
            <button class="mode-btn" onclick="start('cycling')">🚴 Cycling</button>
            <button class="mode-btn" onclick="location.href='history.html'" style="border:none; color: var(--text-sec); font-size: 14px;">📜 View History</button>
        </div>
    </div>

    <script>
        function start(m) {
            localStorage.setItem("cy_mode", m);
            window.location.href = "tracker.html";
        }
    </script>
</body>
</html>
