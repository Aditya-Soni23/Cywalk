<!DOCTYPE html>
<html>
<head>
    <title>Tracking Trip</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
</head>
<body>
    <div id="map"></div>

    <div class="floating-stats">
        <div class="stat-item"><span class="label">Distance</span><span id="d-val" class="val">0.00 km</span></div>
        <div class="stat-item"><span class="label">Speed</span><span id="s-val" class="val">0.0 km/h</span></div>
        <div class="stat-item"><span class="label">Duration</span><span id="t-val" class="val">00:00:00</span></div>
        <div class="stat-item"><span class="label">Clock</span><span id="clock" class="val">--:--</span></div>
    </div>

    <div class="bottom-controls">
        <button class="finish-btn" id="stopAction">Finish Trip</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="tracker.js"></script>
</body>
</html>
